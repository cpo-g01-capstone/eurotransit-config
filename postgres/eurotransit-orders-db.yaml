# CloudNativePG cluster for the Orders service (EM-16).
#
# Operator: deployed by platform/cloudnative-pg.yaml into cnpg-system.
# Application secret (auto-generated): eurotransit-orders-db-app
#   keys: username, password, dbname, host, port, uri, jdbc-uri
# Read/write endpoint: eurotransit-orders-db-rw.eurotransit.svc:5432
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: eurotransit-orders-db
  namespace: eurotransit
spec:
  # 2 instances = primary + 1 standby (ADR 0021, D8): enough for the CE-5
  # failover experiment while respecting the ADR 0005 CPU budget (a third
  # instance would add another 250m request on an already CPU-bound cluster).
  instances: 2
  primaryUpdateStrategy: unsupervised
  # Synchronous replication (ADR 0021, D9): backs the declared RPO = 0 for the
  # single-primary-loss scenario (CE-5) — a commit is acked only after the
  # standby has it. dataDurability: preferred degrades to async if the standby
  # is unavailable, so writes never block with only one standby (the RPO = 0
  # claim covers primary loss, not double failure — stated in the ADR).
  postgresql:
    synchronous:
      method: any
      number: 1
      dataDurability: preferred
  # Required spread across nodes (CE-5 review follow-up 3, 2026-07-12): the CE-5
  # pre-run check found primary AND standby on the same node — CNPG's default
  # anti-affinity is `preferred`, which loses on a small node pool. With both
  # instances co-located, a node drain (CE-3) becomes an unhypothesized double
  # failure and the sync-standby RPO=0 story is void for node-level faults.
  # Trade-off, stated: with `required`, during a drain the replacement instance
  # can sit Pending until the drain ends — that is CORRECT behaviour for CE-3
  # (the PDB/spread story), not a failure.
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: ordersdb
      owner: app
      encoding: UTF8
  resources:
    requests:
      # CPU rightsizing (2026-07-13, CE-3 run-1 capacity finding): 250m -> 100m
      # for all CNPG instances. Measured usage is 7-37m/pod; the 3x B2s_v2 pool
      # is quota-capped at 6 vCPU (ADR 0005) and was 91-96% CPU-requested, so a
      # node drain could not reschedule (CE-3 FAIL). Frees 750m across the 5 DB
      # pods. Limits stay 500m for burst. NOTE: changing resources makes CNPG
      # roll the instances — merge in a quiet window.
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  monitoring:
    enablePodMonitor: true
