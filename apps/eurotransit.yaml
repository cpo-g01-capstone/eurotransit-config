apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eurotransit
  namespace: argocd
spec:
  project: eurotransit
  source:
    repoURL: 'https://github.com/cpo-g01-capstone/eurotransit-config.git'
    targetRevision: HEAD
    path: deploy/charts/eurotransit
    helm:
      releaseName: eurotransit
      valueFiles:
        # Single values file — targets AKS directly (ACR registry, FQDN, TLS).
        # The former values-azure.yaml overlay was folded in (ADR 0006/0009).
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: eurotransit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Hardening H4: PSA labels on the Argo-created namespace. Applied here (not a
    # `kind: Namespace` template in the chart) because CreateNamespace=true already
    # owns that object — a chart-managed Namespace resource would fight Argo CD for
    # ownership of the same labels on every sync. `warn`+`audit` only for now: the
    # app Deployments satisfy `restricted` (C1), but the Strimzi Kafka and
    # CloudNativePG CRs sharing this namespace don't yet set an explicit
    # securityContext, so `enforce` is deferred until that's verified (see the
    # Decision Log in docs/hardening-handout.md).
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    syncOptions:
      - CreateNamespace=true
      # The chart ships CRs whose CRDs are installed by SEPARATE platform apps
      # (ServiceMonitor/PrometheusRule ← kube-prometheus-stack; IngressRoute/
      # TraefikService ← Traefik; Certificate ← cert-manager). Tolerate those CRDs
      # not being registered yet so the sync retries instead of hard-failing.
      # (In the real root-app flow, workloads (wave 1) sync after platform (wave 0),
      # so the CRDs normally exist; this is belt-and-suspenders + fixes the
      # aks-bootstrap branch test, which applies app leaves without that wave gating.)
      - SkipDryRunOnMissingResource=true
