apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eurotransit
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cpo-g01-capstone/eurotransit-config.git'
    targetRevision: HEAD
    path: deploy/charts/eurotransit
    helm:
      releaseName: eurotransit
      valueFiles:
        - values.yaml
      # Azure (AKS) overlay — values-azure.yaml exists in the chart directory.
      # Uncomment to point the live cluster at ACR + Azure FQDN + TLS (ADR 0001).
      # Leave commented while reconciling against k3d / local defaults.
      # - values-azure.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: eurotransit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
