# GitOps: Orders PostgreSQL cluster (CloudNativePG Cluster CR).
# Requires the CloudNativePG operator (platform/cloudnative-pg.yaml) to be Synced first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eurotransit-data
  namespace: argocd
spec:
  project: eurotransit
  source:
    repoURL: 'https://github.com/cpo-g01-capstone/eurotransit-config.git'
    targetRevision: HEAD
    path: postgres
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: eurotransit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The CloudNativePG Cluster CRD is installed by the separate CNPG platform app —
      # tolerate it not being registered yet so the sync retries instead of failing.
      - SkipDryRunOnMissingResource=true
