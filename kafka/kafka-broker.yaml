apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  # 3 dual-role (KRaft controller+broker) nodes — team decision D8 (ADR 0020):
  # real replication quorum for CE-4, accepting the CPU cost on the ADR 0005
  # budget. Resources are deliberately lean; see the capacity note in ADR 0020.
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1Gi

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: eurotransit-kafka
  namespace: eurotransit
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Kafka 4.2.0 — the tested default shipped by Strimzi 1.1.0 (see ADR 0004).
    # 3.7.0 is no longer shipped by the 1.1.0 operator. CR is already KRaft, so no
    # ZooKeeper migration. [app team] confirm kafka-clients >= 3.1 against a 4.2 broker.
    version: 4.2.0
    # Keep broker JVM heap bounded so 3 brokers fit the B2s_v2 nodes (ADR 0020).
    jvmOptions:
      -Xms: 512m
      -Xmx: 512m
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      auto.create.topics.enable: "false"
      # 3-broker HA defaults (ADR 0020, D8): survive one broker loss (CE-4)
      # without losing acked writes — RF 3, writes need 2 in-sync replicas.
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
