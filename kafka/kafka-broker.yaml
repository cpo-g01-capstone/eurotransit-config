apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  # 3 dual-role (KRaft controller+broker) nodes — team decision D8 (ADR 0021):
  # real replication quorum for CE-4, accepting the CPU cost on the ADR 0005
  # budget. Resources are deliberately lean; see the capacity note in ADR 0021.
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  resources:
    requests:
      # CPU rightsizing (2026-07-13, CE-3 run-1 capacity finding): 250m -> 150m.
      # Brokers measure ~20m steady; 150m keeps a stronger CFS share than the
      # app pods (latency-sensitive) while freeing 300m toward drain headroom
      # (quota-capped pool, ADR 0005). Memory request deliberately NOT cut:
      # brokers use ~650Mi of the 768Mi request. Limits stay 500m.
      cpu: 150m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1Gi

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: eurotransit-kafka
  namespace: eurotransit
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Kafka 4.2.0 — the tested default shipped by Strimzi 1.1.0 (see ADR 0004).
    # 3.7.0 is no longer shipped by the 1.1.0 operator. CR is already KRaft, so no
    # ZooKeeper migration. [app team] confirm kafka-clients >= 3.1 against a 4.2 broker.
    version: 4.2.0
    # Keep broker JVM heap bounded so 3 brokers fit the B2s_v2 nodes (ADR 0021).
    # PROPOSAL (memory rightsizing, 2026-07-11): 512m -> 384m. Brokers used
    # ~380-470Mi RSS at demo load (a few msg/s); 384m heap + JVM overhead still
    # fits the 768Mi request and frees ~384Mi on the memory-pressure node.
    # Validate with a k6 baseline BEFORE CE-4 — if broker RSS approaches the
    # limit during the partition test, revert to 512m.
    jvmOptions:
      -Xms: 384m
      -Xmx: 384m
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        # Hardening H1 (2026-07-14): SCRAM-SHA-512 authentication on the
        # internal listener. Every service must present valid credentials
        # (KafkaUser CR) to produce or consume. SCRAM is challenge-response,
        # so the password is never sent in cleartext even without TLS.
        # TLS encryption deferred: traffic is namespace-internal only,
        # and enabling TLS would require truststore config on all services.
        authentication:
          type: scram-sha-512
    config:
      auto.create.topics.enable: "false"
      # 3-broker HA defaults (ADR 0021, D8): survive one broker loss (CE-4)
      # without losing acked writes — RF 3, writes need 2 in-sync replicas.
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}   # manages the five KafkaTopic CRs — required
    # userOperator RE-ENABLED (hardening H1, 2026-07-14): manages KafkaUser CRs
    # for per-service SCRAM-SHA-512 credentials. Adds ~200Mi to the entity-operator
    # pod, accepted as the cost of authenticated Kafka access.
    userOperator: {}
