apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: eurotransit 
  labels:
    strimzi.io/cluster: eurotransit-kafka 
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral

---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: eurotransit-kafka 
  namespace: eurotransit  
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Kafka 4.2.0 — the tested default shipped by Strimzi 1.1.0 (see ADR 0004).
    # 3.7.0 is no longer shipped by the 1.1.0 operator. CR is already KRaft, so no
    # ZooKeeper migration. [app team] confirm kafka-clients >= 3.1 against a 4.2 broker.
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      auto.create.topics.enable: "false" 
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}