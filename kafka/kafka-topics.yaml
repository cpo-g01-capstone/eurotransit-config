# All topics at replication factor 3 (ADR 0021, D8) — with the brokers'
# min.insync.replicas=2 an acked write survives one broker loss (CE-4).
#
# MIGRATION NOTE (one-time, live cluster): the Strimzi topic operator cannot
# change the replication factor of an EXISTING topic without Cruise Control —
# it flags the KafkaTopic as NotReady instead. Since broker storage is
# ephemeral and there is no production data, the agreed path (ADR 0021) is to
# recreate: delete the five topics once after the 3-broker pool is up
# (`kubectl delete kafkatopic -n eurotransit --all`) and let Argo CD re-sync
# them at RF 3. Coordinate with the team — in-flight events are lost.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: order-placed
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: inventory-reserved
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: payment-authorized
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: order-confirmed
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
# RESERVED — NOT WIRED (app ADR-001, 2026-07-08): no service
# produces or consumes this topic. Notifications consumes `order-confirmed` only.
# Kept as a declared-but-unused CR until the team decides to remove it (removal
# deletes the in-cluster topic via Argo CD prune) or a real producer appears.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: notification-requested
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
# Seat-release compensation event (decision D4, 2026-07-11): produced by Orders
# when payment redeliveries are exhausted (order -> FAILED); consumed by
# Inventory to release the order's RESERVED seats. Closes the ADR-005 gap.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: order-failed
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
# Dead-letter topic for the Notifications order-confirmed consumer (decision D4).
# The DeadLetterPublishingRecoverer targets "<topic>.DLT"; with
# auto.create.topics.enable=false the DLT publish FAILS unless the topic exists
# as a CR. Kafka topic names may contain uppercase but Kubernetes resource
# names may not — hence metadata.name != spec.topicName here.
# Longer retention (14d): dead letters are incident evidence, not traffic.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: order-confirmed-dlt
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  topicName: order-confirmed.DLT
  partitions: 3
  replicas: 3
  config:
    retention.ms: 1209600000
