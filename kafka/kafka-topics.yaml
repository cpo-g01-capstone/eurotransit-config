# All topics at replication factor 3 (ADR 0020, D8) — with the brokers'
# min.insync.replicas=2 an acked write survives one broker loss (CE-4).
#
# MIGRATION NOTE (one-time, live cluster): the Strimzi topic operator cannot
# change the replication factor of an EXISTING topic without Cruise Control —
# it flags the KafkaTopic as NotReady instead. Since broker storage is
# ephemeral and there is no production data, the agreed path (ADR 0020) is to
# recreate: delete the five topics once after the 3-broker pool is up
# (`kubectl delete kafkatopic -n eurotransit --all`) and let Argo CD re-sync
# them at RF 3. Coordinate with the team — in-flight events are lost.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: order-placed
  namespace: eurotransit
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
