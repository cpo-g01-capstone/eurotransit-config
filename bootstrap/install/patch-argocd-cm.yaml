# Argo CD core configuration. Strategic-merge patch onto the upstream argocd-cm.
# No namespace here (the kustomization's global `namespace: argocd` applies it).
#
# - url: required so Argo builds correct OAuth callback URLs.
# - dex.config: GitHub connector, login restricted to the cpo-g01-capstone org.
#   clientID/clientSecret are referenced from a SEPARATE secret `argocd-github-oauth`
#   (`$<secret>:<key>` syntax) rather than argocd-secret — keeps the OAuth creds out
#   of the sensitive core secret and avoids patch-mode gymnastics. That secret is a
#   SealedSecret (platform/argocd/secrets/) labelled app.kubernetes.io/part-of: argocd
#   so Argo can read it for substitution.
# - resource.customizations.health: restores health assessment for child Application
#   resources, which Argo CD removed by default. This makes the app-of-apps sync waves
#   wait for earlier child Applications to become Healthy instead of only ordering
#   creation of their Application objects (ADR 0003).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.eurotransit.vojtechn.dev
  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $argocd-github-oauth:clientID
          clientSecret: $argocd-github-oauth:clientSecret
          orgs:
            - name: cpo-g01-capstone
  admin.enabled: "false"
  # Official Argo CD Application health customization. Returning the child's own
  # status.health lets a parent Application aggregate that health recursively:
  # root-app waits for `platform`, and `platform` waits for its operator Applications.
  # Source: https://argo-cd.readthedocs.io/en/release-3.5/operator-manual/health/#argocd-app
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs
  # Fallback reconciliation polling. The GitHub webhook (/api/webhook) is the
  # primary trigger — it reconciles in seconds; this poll is only a safety net for
  # missed/failed deliveries. Default is 180s + jitter; tighten so a dropped webhook
  # still converges quickly. Set to 0s to disable polling and rely on the webhook alone.
  timeout.reconciliation: 30s
  timeout.reconciliation.jitter: 5s
