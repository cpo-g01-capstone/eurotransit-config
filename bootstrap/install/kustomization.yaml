apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  # Pinned to a release tag, not the moving `stable` branch, so the Argo CD version
  # that bootstraps the cluster is reproducible. Bump deliberately in a PR.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml
patches:
  # server.insecure=true so Traefik terminates TLS for the UI (EM-35).
  - path: patch-cmd-params.yaml
  # GitHub SSO (Dex connector) + app URL (EM-39).
  - path: patch-argocd-cm.yaml
  # RBAC: org-restricted SSO users default to admin (EM-39).
  - path: patch-rbac-cm.yaml
  # Sealed-secrets patch-mode annotations so the GitHub webhook secret can be
  # merged into argocd-secret without wiping server.secretkey (webhook setup).
  - path: patch-argocd-secret.yaml
