# Sealed-secrets patch-mode annotations on the Argo CD core secret (webhook setup).
#
# The GitHub webhook shared secret must live under the key `webhook.github.secret`
# INSIDE argocd-secret — Argo CD hardcodes that location (unlike the Dex OAuth creds,
# which use `$argocd-github-oauth:key` indirection and can sit in their own Secret).
# We inject it with a patch-mode SealedSecret:
#   platform/argocd/secrets/webhook-github-secret.sealed.yaml
#
# For the sealed-secrets controller to MERGE that one key instead of REPLACING the
# whole Secret — which would wipe the runtime-populated `server.secretkey` (signs
# session JWTs) and `admin.password`, crashlooping argocd-server (the lab04 incident) —
# these annotations must be present on the LIVE argocd-secret. This strategic-merge
# patch is the kustomize-native equivalent of the Helm chart's
# `configs.secret.annotations`; the `argocd` self-manage app reconciles it from Git.
#
# Annotations only. `/data` is populated at runtime and is ignoreDifferences'd by the
# self-manage app (bootstrap/apps/argocd.yaml), so neither Argo nor this patch touches
# server.secretkey / admin.password / webhook.github.secret.
#
# The matching `skip-set-owner-references` annotation lives on the SealedSecret's own
# template (so deleting the SealedSecret can't cascade-delete argocd-secret).
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  annotations:
    sealedsecrets.bitnami.com/managed: "true"   # controller may modify a Secret it didn't create
    sealedsecrets.bitnami.com/patch: "true"      # merge keys; never replace the whole Secret
