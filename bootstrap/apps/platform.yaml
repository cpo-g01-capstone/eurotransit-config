apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/TODO-TEAM/eurotransit-config.git' # TO BE CHANGED
    targetRevision: HEAD
    path: platform
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
