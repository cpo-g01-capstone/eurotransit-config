# Argo CD self-management (app-of-apps).
#
# The chicken-and-egg: Argo CD can't deploy the FIRST Argo CD from Git, so a
# minimal imperative seed installs it once (`just install-argocd` →
# `kubectl apply -k bootstrap/install`). THIS Application then points back at the
# SAME `bootstrap/install` kustomization and adopts those resources, so from here
# on everything about Argo CD — the pinned version, `server.insecure`, RBAC,
# CRDs — is reconciled from Git like everything else (self-heal + prune). The
# seed becomes a one-time bootstrap, not the source of truth.
#
# Wave -1: reconcile the platform's own controller before the other platform
# app-of-apps children (platform wave 0, workloads wave 1). The initial seed and
# this self-management app both install the Application health customization from
# patch-argocd-cm.yaml, so the parent waits for child Applications to become Healthy
# before advancing to the next wave (ADR 0003).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  source:
    repoURL: 'https://github.com/cpo-g01-capstone/eurotransit-config.git'
    targetRevision: HEAD
    path: bootstrap/install
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  # argocd-secret is created EMPTY by the upstream install, then populated at
  # RUNTIME with server.secretkey (signs session JWTs) and admin.password. Without
  # this, self-heal + prune would reconcile it back to empty and wipe those keys —
  # argocd-server crashloops and everyone is logged out (the lab04 incident).
  # Ignore its data entirely; the self-mgmt app has no business managing it.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Argo CD's own CRDs are too large for client-side apply (the same reason
      # `just install-argocd` uses --server-side). Required or the sync fails on
      # the last-applied-configuration annotation size limit.
      - ServerSideApply=true
