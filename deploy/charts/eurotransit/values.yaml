# ==============================================================================
# EuroTransit — Helm values
#
# Single values file targeting the AKS cluster (one environment — ADR 0006/0009).
# The former values-azure.yaml overlay was folded in here.
#
# CI bumps the `tag` field under each service's `image` block.
# Everything else changes only when the team deliberately decides to.
# ==============================================================================

global:
  # ACR login server (ADR 0001) — prefixes every service image.
  imageRegistry: "acreurotransitg01.azurecr.io"
  # Empty: AKS pulls via the kubelet's AcrPull (`az aks update --attach-acr`, ADR 0010).
  # Use [{name: acr-pull-secret}] only if you seal a pull secret instead of attaching.
  imagePullSecrets: []
# ------------------------------------------------------------------------------
# Graceful shutdown (shared across all services)
#
# Drain chain on SIGTERM (Pod deletion / rollout / node drain):
#   1. Pod enters Terminating → removed from the Service's ready endpoints, so
#      Traefik and kube-proxy stop sending NEW traffic to it.
#   2. preStop `sleep` keeps the container alive while that endpoint removal
#      propagates, so in-flight requests are not dropped mid-flight.
#   3. SIGTERM reaches Spring Boot → graceful shutdown drains in-flight work and
#      flips readiness to OUT_OF_SERVICE (requires server.shutdown=graceful in
#      the app — verified app-side, Pillar A).
#   4. The JVM exits before terminationGracePeriodSeconds elapses.
#
# Invariant: preStopSleepSeconds + shutdownTimeout < terminationGracePeriodSeconds.
#            (5 + 50 = 55 < 60) — keep this true if you tune the numbers.
# ------------------------------------------------------------------------------
lifecycle:
  terminationGracePeriodSeconds: 60
  preStopSleepSeconds: 5
  # Spring `spring.lifecycle.timeout-per-shutdown-phase`
  shutdownTimeout: "50s"
# ------------------------------------------------------------------------------
# Probes (shared across all services)
#
# startup + liveness hit /actuator/health/liveness — LOCAL process only, never a
# downstream dependency (a liveness probe that checks Kafka/DB causes cascading
# restarts — hard rule).
# readiness hits /actuator/health/readiness — the app's internal ReadinessState
# only, flipped to REFUSING_TRAFFIC during shutdown drain so traffic is
# withdrawn. DB/Kafka are deliberately NOT in the readiness group (app-repo
# ADR 0004): a shared-dependency blip would de-register every replica at once.
# ------------------------------------------------------------------------------
probes:
  startup:
    failureThreshold: 20
    periodSeconds: 10
  liveness:
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    periodSeconds: 5
    failureThreshold: 3
# ------------------------------------------------------------------------------
# Catalog — read-heavy, tolerant of staleness, no DB
# ------------------------------------------------------------------------------
catalog:
  image:
    repository: eurotransit/catalog
    tag: "66fafcf"
    pullPolicy: IfNotPresent
  # No replicaCount: the HPA owns replicas (baseline = hpa.minReplicas).
  resources:
    requests:
      # See CPU rightsizing round-2 note under orders.resources (2026-07-13, CE-3).
      cpu: "75m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  kafkaUserSecret: "eurotransit-catalog"
  hpa:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # Blue/green track (ADR 0026). The switch happens at the IngressRoute:
  # /api/catalog points at the service of the ACTIVE track. Rollback = revert
  # the activeTrack commit (Traefik cutover is instant, the old track keeps
  # running). Ratified window (ADR 0026): delete the old track after 5 clean minutes post-switch.
  blueGreen:
    # Deploys the green Deployment+Service alongside blue. Off outside demos —
    # a second track costs a full pod on the 6 vCPU budget.
    enabled: false
    # Which track the IngressRoute serves: "blue" (the regular Deployment) or
    # "green" (the candidate). Change THIS value to switch traffic.
    activeTrack: "green"
    # Image tag for the green candidate (a specific immutable SHA).
    tag: ""
# ------------------------------------------------------------------------------
# Orders — synchronous entry point, publishes to Kafka, owns the DB
# ------------------------------------------------------------------------------
orders:
  image:
    repository: eurotransit/orders
    tag: "26c5217"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      # CPU rightsizing round 2 (2026-07-13, CE-3 run-1 capacity finding): 100m ->
      # 75m for catalog/orders/inventory/payments. The 3x B2s_v2 pool is quota-
      # capped at 6 vCPU (ADR 0005, increase denied) and sat at 91-96% CPU-requests
      # — a drained node's pods had nowhere to go (CE-3 FAIL). Actual usage is
      # 3-7m/pod. Trade-off: HPA targets are % of request, so JVM startup bursts
      # read hotter — watch for transient scale-up flap during rollouts (ADR 0023).
      # Round 1 (2026-07-11, #46): 150m -> 100m. Limits stay 1000m for real burst.
      cpu: "75m"
      # PROPOSAL (memory rightsizing, 2026-07-11): 512Mi -> 384Mi requests and
      # 1Gi -> 768Mi limits for the three DB-backed services (orders/inventory/
      # payments). Measured RSS 215-260Mi; frees 128Mi of scheduling reservation
      # per pod (more once HPA scales out). Java 21 sizes default heap off the
      # limit, so the lower limit also trims worst-case. Watch for GC pressure /
      # OOMKill after rollout — if a pod restarts on memory, bump that service's
      # limit back to 1Gi and keep the request.
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"
  db:
    # Name of the CloudNativePG-generated secret (<cluster>-app)
    secretName: "eurotransit-orders-db-app"
    # Primary (read-write) service endpoint
    host: "eurotransit-orders-db-rw.eurotransit.svc.cluster.local"
    port: "5432"
    name: "ordersdb"
  kafkaUserSecret: "eurotransit-orders"
  # Canary track (ADR 0026). /api/orders always routes through the
  # weighted TraefikService; with the canary disabled the stable track gets
  # 100%. Promotion gate (team-ratified, ADR 0026 — stricter than the SLO on purpose): error rate
  # < 1% AND p95 < 300ms sustained for 5 minutes on the canary — then promote
  # (bump orders.image.tag to the canary tag, disable the canary) or abort
  # (weight back to 0, disable).
  canary:
    # Deploys the canary Deployment+Service and adds it to the weighted
    # TraefikService. Off outside rollouts (a pod of budget, like blueGreen).
    enabled: false
    # Fraction of /api/orders traffic sent to the canary (0-100).
    weight: 10
    # Image tag of the canary candidate (a specific immutable SHA).
    tag: ""
# ------------------------------------------------------------------------------
# Inventory — contended resource, must never oversell
# ------------------------------------------------------------------------------
inventory:
  image:
    repository: eurotransit/inventory
    tag: "66fafcf"
    pullPolicy: IfNotPresent
  # No replicaCount: the HPA owns replicas (baseline = hpa.minReplicas).
  resources:
    requests:
      # See CPU rightsizing notes under orders.resources (round 2: 2026-07-13, CE-3).
      cpu: "75m"
      # See memory-rightsizing proposal under orders.resources (2026-07-11).
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"
  # HPA (ADR 0023): the contended money-path service. CPU is a proxy signal
  # (the truer one would be consumer lag via prometheus-adapter — future work);
  # maxReplicas capped to fit the 6 vCPU budget alongside the HA replicas (ADR 0021).
  hpa:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  db:
    # CloudNativePG-generated secret for cluster eurotransit-inventory-db (ADR-0020)
    secretName: "eurotransit-inventory-db-app"
    # Primary (read-write) service endpoint
    host: "eurotransit-inventory-db-rw.eurotransit.svc.cluster.local"
    port: "5432"
    name: "inventorydb"
  kafkaUserSecret: "eurotransit-inventory"
# ------------------------------------------------------------------------------
# Payments — strict idempotency, must not double-charge
# ------------------------------------------------------------------------------
payments:
  image:
    repository: eurotransit/payments
    tag: "26c5217"
    pullPolicy: IfNotPresent
  # No replicaCount: the HPA owns replicas (baseline = hpa.minReplicas).
  resources:
    requests:
      # See CPU rightsizing notes under orders.resources (round 2: 2026-07-13, CE-3).
      cpu: "75m"
      # See memory-rightsizing proposal under orders.resources (2026-07-11).
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"
  # HPA (ADR 0023): sized like inventory; the sync authorize call (ADR 0018)
  # makes Payments latency directly user-visible, so headroom matters.
  hpa:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  db:
    # CloudNativePG-generated secret for cluster eurotransit-payments-db
    secretName: "eurotransit-payments-db-app"
    # Primary (read-write) service endpoint
    host: "eurotransit-payments-db-rw.eurotransit.svc.cluster.local"
    port: "5432"
    name: "paymentsdb"
  kafkaUserSecret: "eurotransit-payments"
# ------------------------------------------------------------------------------
# Notifications — fully async; failure must degrade gracefully
# ------------------------------------------------------------------------------
notifications:
  image:
    repository: eurotransit/notifications
    tag: "bbb1d60"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  db:
    # CloudNativePG-generated secret for cluster eurotransit-notifications-db (ADR-002)
    secretName: "eurotransit-notifications-db-app"
    # Primary (read-write) service endpoint
    host: "eurotransit-notifications-db-rw.eurotransit.svc.cluster.local"
    port: "5432"
    name: "notificationsdb"
  kafkaUserSecret: "eurotransit-notifications"
  # Real order-confirmation email. sender=smtp switches notifications from the
  # logging stub to JavaMail (best-effort: a send failure degrades only the
  # notification, never checkout). Credentials come from a SealedSecret (never
  # plaintext) — seal a Mailtrap sandbox user/pass with:
  #   just seal eurotransit-notifications-smtp eurotransit
  # where .env.eurotransit-notifications-smtp holds SPRING_MAIL_USERNAME and
  # SPRING_MAIL_PASSWORD.
  smtp:
    sender: "smtp"
    from: "noreply@eurotransit.test"
    host: "sandbox.smtp.mailtrap.io"
    port: "2525"
    secretName: "eurotransit-notifications-smtp"
# ------------------------------------------------------------------------------
# Frontend — static SPA (nginx). No state, no Kafka, no DB; not on the money
# path. nginx serves the bundle on 8080 (chart-wide appPort) with the security
# headers baked into the image (app-repo frontend/deploy/nginx.conf).
# ------------------------------------------------------------------------------
frontend:
  image:
    repository: eurotransit/frontend
    # Initial tag = bootstrap image pushed from the same source as app-repo
    # PR #29 (documented there). From the first frontend/** merge onwards this
    # field is CI-owned like every other service tag.
    tag: "bbb1d60"
    pullPolicy: IfNotPresent
  # Static content: fixed replica count (no HPA — nothing meaningful to scale
  # on); the PDB keeps one replica through voluntary disruptions.
  replicaCount: 2
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
# ------------------------------------------------------------------------------
# Kafka (Strimzi cluster in the same namespace)
# ------------------------------------------------------------------------------
kafka:
  bootstrapServers: "eurotransit-kafka-kafka-bootstrap.eurotransit.svc.cluster.local:9092"
# ------------------------------------------------------------------------------
# Ingress
# Public host on AKS; TLS via cert-manager + Let's Encrypt (HTTP-01). The chart's
# redirect Middleware forces HTTP→HTTPS. See docs/delivery/tls-issuance-runbook.md.
# ------------------------------------------------------------------------------
ingress:
  host: "eurotransit.vojtechn.dev"
  tls: true
  tlsSecretName: "eurotransit-tls"
  # ClusterIssuer for the cert-manager Certificate. letsencrypt-prod = trusted cert;
  # switch to letsencrypt-staging (high rate limits) while iterating on issuance.
  certIssuer: "letsencrypt-prod"
# ------------------------------------------------------------------------------
# NetworkPolicy
# Default-deny + explicit allows for the five application pods only.
# NOTE: only enforced by a CNI that supports NetworkPolicy. AKS Azure CNI /
# Calico enforces these; a CNI without NetworkPolicy support applies them as a
# no-op. See docs/delivery/network-policy-checklist.md before relying on
# enforcement.
# ------------------------------------------------------------------------------
networkPolicy:
  enabled: true
  appPort: 8080 # container port the services listen on
  dbPort: 5432 # CloudNativePG (in-namespace)
  kafkaPort: 9092 # Strimzi Kafka bootstrap (in-namespace)
  otlpPort: 4318 # Tempo OTLP/HTTP receiver in the monitoring namespace (trace export, ADR 0022)
  ingressNamespace: "traefik" # namespace Traefik runs in (north-south source)
  monitoringNamespace: "monitoring" # namespace Prometheus scrapes from
# ------------------------------------------------------------------------------
# Grafana dashboards (RED money-path + order lifecycle + USE infrastructure),
# shipped as ConfigMaps and hot-loaded by the kube-prometheus-stack Grafana sidecar.
# JSON sources live in dashboards/*.json (outside templates/, so Grafana's
# {{job}} legend syntax never meets the Helm renderer).
# ------------------------------------------------------------------------------
dashboards:
  enabled: true
