# ==============================================================================
# EuroTransit — Staging overlay
#
# Applied ON TOP of values.yaml AND values-azure.yaml (in that order) by the
# eurotransit-staging Argo CD Application. Carries ONLY the deltas that make a
# second, isolated stack coexist with prod on the SAME AKS cluster:
#   - a distinct host (own cert, own IngressRoute)
#   - 1 replica per service (the cluster is budget-tight — ADR 0001)
# It INHERITS from values-azure.yaml: the ACR registry, imagePullSecrets, TLS on,
# and the letsencrypt-staging issuer (untrusted certs, high rate limits — right
# for a throwaway stage). Never put image tags here — CI bumps them in values.yaml.
#
# Usage (see apps/eurotransit-staging.yaml):
#   helm template eurotransit . -f values.yaml -f values-azure.yaml -f values-staging.yaml
#
# Deployed into namespace `eurotransit-staging`. Kafka + Postgres are NOT part of
# this stack (decided): the app chart only. Services that need Kafka/DB will be
# NotReady here — fine for testing ingress/TLS/routing and progressive delivery.
# ==============================================================================

# ------------------------------------------------------------------------------
# Ingress — staging host. One wildcard DNS record (*.eurotransit.vojtechn.dev →
# Traefik LB IP) covers this and argocd.eurotransit.vojtechn.dev. TLS + certIssuer
# (letsencrypt-staging) are inherited from values-azure.yaml.
# ------------------------------------------------------------------------------
ingress:
  host: "staging.eurotransit.vojtechn.dev"

# ------------------------------------------------------------------------------
# One replica per service — staging is for validation, not load. Halves the
# footprint so stage + prod both fit the 3-node pool.
# ------------------------------------------------------------------------------
catalog:
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 2
orders:
  replicaCount: 1
inventory:
  replicaCount: 1
payments:
  replicaCount: 1
notifications:
  replicaCount: 1
