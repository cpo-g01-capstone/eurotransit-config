apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: eurotransit-orders
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-orders
    app.kubernetes.io/instance: {{ .Release.Name }}
    release: kube-prometheus-stack
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  groups:
    - name: eurotransit.checkout.slos
      interval: 30s
      rules:
        # Fires when more than 5% of checkout requests return 5xx for 2 minutes.
        # Symptom-based: tied directly to user-visible failure, not CPU or memory.
        - alert: CheckoutHighErrorRate
          expr: |
            100 * sum(rate(http_server_requests_seconds_count{namespace="{{ .Release.Namespace }}", status=~"5..", uri!~"/actuator.*"}[2m]))
              / sum(rate(http_server_requests_seconds_count{namespace="{{ .Release.Namespace }}", uri!~"/actuator.*"}[2m]))
            > 5
          for: 2m
          labels:
            severity: critical
            team: eurotransit
          annotations:
            summary: "Checkout error rate above 5%"
            description: "{{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}% of checkout requests are returning 5xx."

        # Fires when p95 checkout latency exceeds 500ms for 3 minutes.
        - alert: CheckoutHighP95Latency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(http_server_requests_seconds_bucket{namespace="{{ .Release.Namespace }}", uri!~"/actuator.*"}[5m])
              )
            ) > 0.5
          for: 3m
          labels:
            severity: warning
            team: eurotransit
          annotations:
            summary: "Checkout p95 latency above 500ms"
            description: "p95 latency is {{ "{{" }} $value | printf \"%.0f\" {{ "}}" }}ms."

        # Fires when the Inventory scrape target goes down for 1 minute.
        - alert: InventoryServiceDown
          expr: |
            absent(up{job="eurotransit-inventory", namespace="{{ .Release.Namespace }}"} == 1)
          for: 1m
          labels:
            severity: critical
            team: eurotransit
          annotations:
            summary: "Inventory service scrape target is down"
            description: "No healthy Inventory pods have been scraped for over 1 minute."

        # Fires when Kafka consumer lag is high, indicating the async pipeline is stalling.
        - alert: KafkaConsumerLagHigh
          expr: |
            sum by (consumergroup, topic) (
              kafka_consumergroup_lag{namespace="{{ .Release.Namespace }}"}
            ) > 1000
          for: 5m
          labels:
            severity: warning
            team: eurotransit
          annotations:
            summary: "Kafka consumer lag is high"
            description: "Consumer group {{ "{{" }} $labels.consumergroup {{ "}}" }} on topic {{ "{{" }} $labels.topic {{ "}}" }} has lag {{ "{{" }} $value {{ "}}" }}."
