apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-orders
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-orders
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orders.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-orders
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-orders
        app.kubernetes.io/instance: {{ .Release.Name }}
        # Grants the pod the NetworkPolicy selector (adversarial-audit fix, #52):
        # the policies select part-of, which commonLabels puts on the
        # Deployment but NOT on the pod template — without this line every
        # policy silently matched zero pods.
        app.kubernetes.io/part-of: eurotransit
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds }}
      {{- include "eurotransit.topologySpread" (dict "name" "eurotransit-orders" "instance" .Release.Name "hard" true) | nindent 6 }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: orders
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.orders.image) }}
          imagePullPolicy: {{ .Values.orders.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # Pin to the chart's standard http port (see catalog/deployment.yaml).
            - name: SERVER_PORT
              value: "8080"
            # DB env var names must match orders-service application.yml (ORDERS_DB_*),
            # not Spring's SPRING_DATASOURCE_*. The app uses R2DBC at runtime and a
            # separate JDBC URL for Flyway migrations (Flyway is JDBC-only). Wrong
            # names → the app silently falls back to its localhost default and crashes.
            - name: ORDERS_DB_R2DBC_URL
              value: "r2dbc:postgresql://{{ .Values.orders.db.host }}:{{ .Values.orders.db.port }}/{{ .Values.orders.db.name }}"
            - name: ORDERS_DB_JDBC_URL
              value: "jdbc:postgresql://{{ .Values.orders.db.host }}:{{ .Values.orders.db.port }}/{{ .Values.orders.db.name }}"
            - name: ORDERS_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orders.db.secretName }}
                  key: username
            - name: ORDERS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orders.db.secretName }}
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "orders-group"
            # Spring graceful shutdown — drain in-flight work before the JVM exits.
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: {{ .Values.lifecycle.shutdownTimeout | quote }}
          {{- include "eurotransit.preStop" . | nindent 10 }}
          {{- include "eurotransit.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.orders.resources | nindent 12 }}
