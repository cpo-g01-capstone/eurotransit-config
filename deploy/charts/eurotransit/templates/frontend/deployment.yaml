apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  # Fixed replicas (values.frontend.replicaCount): no HPA for static content,
  # so unlike the services this Deployment owns its replica count.
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
        # Grants the pod the NetworkPolicy selector (same rationale as the
        # services, #52): default-deny + allow-ingress-traefik select part-of
        # on the POD template, not just the Deployment.
        app.kubernetes.io/part-of: eurotransit
    spec:
      {{- include "eurotransit.topologySpread" (dict "name" "eurotransit-frontend" "instance" .Release.Name) | nindent 6 }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # nginx serving static files — there is no actuator. Probing the SPA
          # index IS a local-process-only check (probe rules respected: nothing
          # downstream is touched; nginx never calls the API itself).
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
