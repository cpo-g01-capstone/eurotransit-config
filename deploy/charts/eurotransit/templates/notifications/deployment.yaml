apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-notifications
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-notifications
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notifications.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-notifications
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-notifications
        app.kubernetes.io/instance: {{ .Release.Name }}
        # Grants the pod the NetworkPolicy selector (adversarial-audit fix, #52):
        # the policies select part-of, which commonLabels puts on the
        # Deployment but NOT on the pod template — without this line every
        # policy silently matched zero pods.
        app.kubernetes.io/part-of: eurotransit
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds }}
      {{- include "eurotransit.podSecurityContext" . | nindent 6 }}
      {{- include "eurotransit.topologySpread" (dict "name" "eurotransit-notifications" "instance" .Release.Name) | nindent 6 }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: notifications
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.notifications.image) }}
          imagePullPolicy: {{ .Values.notifications.image.pullPolicy }}
          {{- include "eurotransit.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # Pin to the chart's standard http port (see catalog/deployment.yaml).
            - name: SERVER_PORT
              value: "8080"
            # DB env var names must match notifications-service application.yml
            # (NOTIFICATIONS_DB_*), not SPRING_DATASOURCE_*. R2DBC at runtime; a
            # separate JDBC URL for Flyway (JDBC-only). See agent-log Case 13 and
            # ADR-002 (durable dedup store, cluster eurotransit-notifications-db).
            - name: NOTIFICATIONS_DB_R2DBC_URL
              value: "r2dbc:postgresql://{{ .Values.notifications.db.host }}:{{ .Values.notifications.db.port }}/{{ .Values.notifications.db.name }}"
            - name: NOTIFICATIONS_DB_JDBC_URL
              value: "jdbc:postgresql://{{ .Values.notifications.db.host }}:{{ .Values.notifications.db.port }}/{{ .Values.notifications.db.name }}"
            - name: NOTIFICATIONS_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.db.secretName }}
                  key: username
            - name: NOTIFICATIONS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.db.secretName }}
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- include "eurotransit.kafkaSaslEnv" .Values.notifications.kafkaUserSecret | nindent 12 }}
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "notifications-group"
            # Spring graceful shutdown — drain in-flight work before the JVM exits.
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: {{ .Values.lifecycle.shutdownTimeout | quote }}
            # Real SMTP order-confirmation email. sender=smtp switches off the
            # logging stub; a send failure degrades only the notification (retry
            # -> DLT), never checkout. Credentials from a SealedSecret (never
            # plaintext) — see values.yaml notifications.smtp and `just seal`.
            - name: NOTIFICATIONS_EMAIL_SENDER
              value: {{ .Values.notifications.smtp.sender | quote }}
            - name: NOTIFICATIONS_EMAIL_FROM
              value: {{ .Values.notifications.smtp.from | quote }}
            - name: SPRING_MAIL_HOST
              value: {{ .Values.notifications.smtp.host | quote }}
            - name: SPRING_MAIL_PORT
              value: {{ .Values.notifications.smtp.port | quote }}
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.smtp.secretName }}
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.smtp.secretName }}
                  key: SPRING_MAIL_PASSWORD
          {{- include "eurotransit.preStop" . | nindent 10 }}
          {{- include "eurotransit.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.notifications.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
