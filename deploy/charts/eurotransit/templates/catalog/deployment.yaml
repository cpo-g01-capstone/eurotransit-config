apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-catalog
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  # spec.replicas intentionally omitted: the catalog HPA owns the replica count.
  # Pinning it here makes Argo CD selfHeal fight HPA scale-out (ADR 0023).
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-catalog
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-catalog
        app.kubernetes.io/instance: {{ .Release.Name }}
        # Grants the pod the NetworkPolicy selector (adversarial-audit fix, #52):
        # the policies select part-of, which commonLabels puts on the
        # Deployment but NOT on the pod template — without this line every
        # policy silently matched zero pods.
        app.kubernetes.io/part-of: eurotransit
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds }}
      {{- include "eurotransit.podSecurityContext" . | nindent 6 }}
      {{- include "eurotransit.topologySpread" (dict "name" "eurotransit-catalog" "instance" .Release.Name) | nindent 6 }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: catalog
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.catalog.image) }}
          imagePullPolicy: {{ .Values.catalog.image.pullPolicy }}
          {{- include "eurotransit.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # Pin the app to the single http port the chart standardises on:
            # containerPort, Service targetPort, ServiceMonitor and NetworkPolicy
            # (networkPolicy.appPort) all assume 8080. The service images each
            # default to a distinct dev port (8081-8085), so without this the
            # startup/liveness probes hit a closed 8080 and the Pod restart-loops.
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            # Spring graceful shutdown — drain in-flight work before the JVM exits.
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: {{ .Values.lifecycle.shutdownTimeout | quote }}
          {{- include "eurotransit.preStop" . | nindent 10 }}
          {{- include "eurotransit.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.catalog.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
