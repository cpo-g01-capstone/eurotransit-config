apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-catalog
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.catalog.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-catalog
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-catalog
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 60
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: catalog
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.catalog.image) }}
          imagePullPolicy: {{ .Values.catalog.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            # Allow Spring Boot time to finish in-flight work before the JVM exits.
            # Must be less than terminationGracePeriodSeconds (60s).
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: "50s"
          lifecycle:
            preStop:
              exec:
                # Brief sleep lets kube-proxy finish removing this pod from endpoints
                # before SIGTERM lands, preventing in-flight requests from being dropped.
                command: ["/bin/sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.catalog.resources | nindent 12 }}
