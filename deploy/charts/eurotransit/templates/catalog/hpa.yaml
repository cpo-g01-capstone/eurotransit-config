apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eurotransit-catalog
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eurotransit-catalog
  minReplicas: {{ .Values.catalog.hpa.minReplicas }}
  maxReplicas: {{ .Values.catalog.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.catalog.hpa.targetCPUUtilizationPercentage }}
