apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eurotransit-catalog
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
    # Required so the kube-prometheus-stack Prometheus instance selects this monitor.
    release: kube-prometheus-stack
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-catalog
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
