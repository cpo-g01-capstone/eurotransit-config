apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: eurotransit-inventory
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-inventory
    app.kubernetes.io/instance: {{ .Release.Name }}
    release: kube-prometheus-stack
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  groups:
    - name: eurotransit.inventory.slos
      interval: 30s
      rules:
        # Fires when the Inventory scrape target goes down for 1 minute.
        # (Moved here from the orders PrometheusRule — one rule file per service.)
        - alert: InventoryServiceDown
          expr: |
            absent(up{job="eurotransit-inventory", namespace="{{ .Release.Namespace }}"} == 1)
          for: 1m
          labels:
            severity: critical
            team: eurotransit
          annotations:
            summary: "Inventory service scrape target is down"
            description: "No healthy Inventory pods have been scraped for over 1 minute."

        # Inventory sits on the synchronous money path (seat reservation): a
        # failing reservation surfaces as a failed checkout. Warning, not page —
        # the user-visible symptom pages via the checkout burn-rate alerts.
        - alert: InventoryHighErrorRate
          expr: |
            100 * sum(rate(http_server_requests_seconds_count{namespace="{{ .Release.Namespace }}", job="eurotransit-inventory", status=~"5..", uri!~"/actuator.*"}[2m]))
              / sum(rate(http_server_requests_seconds_count{namespace="{{ .Release.Namespace }}", job="eurotransit-inventory", uri!~"/actuator.*"}[2m]))
            > 5
          for: 2m
          labels:
            severity: warning
            team: eurotransit
          annotations:
            summary: "Inventory error rate above 5%"
            description: "{{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}% of Inventory requests are returning 5xx."

        # Slow reservations eat directly into the 500ms checkout latency SLO.
        - alert: InventoryHighP95Latency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(http_server_requests_seconds_bucket{namespace="{{ .Release.Namespace }}", job="eurotransit-inventory", uri!~"/actuator.*"}[5m])
              )
            ) > 0.5
          for: 3m
          labels:
            severity: warning
            team: eurotransit
          annotations:
            summary: "Inventory p95 latency above 500ms"
            description: "Inventory p95 latency is {{ "{{" }} $value | printf \"%.2f\" {{ "}}" }}s — the checkout latency SLO is at risk."
