apiVersion: apps/v1
kind: Deployment
metadata:
  name: eurotransit-inventory
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-inventory
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.inventory.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-inventory
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eurotransit-inventory
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds }}
      {{- include "eurotransit.topologySpread" (dict "name" "eurotransit-inventory" "instance" .Release.Name) | nindent 6 }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: inventory
          image: {{ include "eurotransit.imageRef" (list .Values.global.imageRegistry .Values.inventory.image) }}
          imagePullPolicy: {{ .Values.inventory.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # Pin to the chart's standard http port (see catalog/deployment.yaml).
            - name: SERVER_PORT
              value: "8080"
            # DB env var names must match inventory-service application.yml (INVENTORY_DB_*).
            # R2DBC at runtime; a separate JDBC URL for Flyway (JDBC-only). ADR-0020.
            - name: INVENTORY_DB_R2DBC_URL
              value: "r2dbc:postgresql://{{ .Values.inventory.db.host }}:{{ .Values.inventory.db.port }}/{{ .Values.inventory.db.name }}"
            - name: INVENTORY_DB_JDBC_URL
              value: "jdbc:postgresql://{{ .Values.inventory.db.host }}:{{ .Values.inventory.db.port }}/{{ .Values.inventory.db.name }}"
            - name: INVENTORY_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.inventory.db.secretName }}
                  key: username
            - name: INVENTORY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.inventory.db.secretName }}
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "inventory-group"
            # Spring graceful shutdown — drain in-flight work before the JVM exits.
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: {{ .Values.lifecycle.shutdownTimeout | quote }}
          {{- include "eurotransit.preStop" . | nindent 10 }}
          {{- include "eurotransit.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.inventory.resources | nindent 12 }}
