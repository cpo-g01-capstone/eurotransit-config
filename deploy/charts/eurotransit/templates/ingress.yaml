{{- if .Values.ingress.tls }}
# --- HTTP → HTTPS redirect router (web entrypoint only) ---
# Matches the host on :80 and applies the redirect-https Middleware, returning a
# 301 to HTTPS before any routing. Kept on a SEPARATE router from the app routes
# (which live on websecure) so redirectScheme never loops on an already-HTTPS
# request. Only present when TLS is on (AKS). lab04 redirect pattern.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: eurotransit-redirect
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: eurotransit-redirect-https
      services:
        # Unused: the redirect Middleware returns a 301 before traffic reaches a
        # backend. A services entry is still required by the IngressRoute schema.
        - name: eurotransit-catalog
          port: 80
---
{{- end }}
# --- Application router ---
# With TLS on (tls: true, i.e. AKS) this serves the routes on websecure (:443)
# with the cert-manager-issued cert; plain-HTTP is handled by the redirect router
# above. With TLS off (tls: false) it serves the same routes on web (:80), no redirect.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: eurotransit
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  entryPoints:
    {{- if .Values.ingress.tls }}
    - websecure
    {{- else }}
    - web
    {{- end }}
  routes:
    # Blue/green switch point (ADR 0026): the route serves the ACTIVE
    # track's Service. Switching = one commit changing catalog.blueGreen
    # .activeTrack; the inactive track keeps running for instant rollback (ratified window, ADR 0026:
    # delete it after 5 clean minutes).
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/catalog`)
      kind: Rule
      middlewares:
        - name: eurotransit-strip-api
      services:
        {{- if and .Values.catalog.blueGreen.enabled (eq .Values.catalog.blueGreen.activeTrack "green") }}
        - name: eurotransit-catalog-green
          port: 80
        {{- else }}
        - name: eurotransit-catalog
          port: 80
        {{- end }}
    # Canary entry point (ADR 0026): always via the weighted
    # TraefikService — with the canary disabled it collapses to stable 100%.
    # Before #54 this pointed straight at the Service, which made the weighted
    # TraefikService dead config (weights had no effect).
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/orders`)
      kind: Rule
      middlewares:
        - name: eurotransit-strip-api
      services:
        - name: eurotransit-orders-weighted
          kind: TraefikService
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/inventory`)
      kind: Rule
      middlewares:
        - name: eurotransit-strip-api
      services:
        - name: eurotransit-inventory
          port: 80
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/payments`)
      kind: Rule
      middlewares:
        - name: eurotransit-strip-api
      services:
        - name: eurotransit-payments
          port: 80
    # Frontend SPA: catch-all `/`. Traefik's default priority is rule length,
    # so every longer /api/* rule above always wins — this route only receives
    # traffic no API rule matched. No strip middleware: nginx serves the SPA
    # at / and falls back to index.html for client-side routes.
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: eurotransit-frontend
          port: 80
  {{- if .Values.ingress.tls }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
