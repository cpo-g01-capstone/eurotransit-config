apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: eurotransit-notifications
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: eurotransit-notifications
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  # DELIBERATELY maxUnavailable (not minAvailable): notifications runs a single
  # best-effort replica — minAvailable: 1 would make every node drain hang forever
  # waiting for an eviction that can never satisfy the budget. maxUnavailable: 1
  # states the policy explicitly: this pod MAY be evicted; unacked Kafka records
  # are simply redelivered after rebalance and checkout is never affected
  # (graceful degradation is this service's contract).
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eurotransit-notifications
      app.kubernetes.io/instance: {{ .Release.Name }}
