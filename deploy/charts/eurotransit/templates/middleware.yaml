{{- if .Values.ingress.tls }}
# HTTP→HTTPS redirect, applied PER-ROUTE to the app IngressRoute's `web`
# entrypoint (see ingress.yaml). Replaces the former global entrypoint
# redirection in platform/traefik/traefik.yaml — keeping the redirect scoped to
# the app routes so it never interferes with other entrypoints (e.g. the
# cert-manager HTTP-01 ACME challenge). lab04 `redirect-https` pattern.
#
# Only rendered when TLS is on (ingress.tls: true — i.e. AKS). With TLS off the
# app is served over plain HTTP with no redirect (no cert to redirect to).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: eurotransit-redirect-https
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}

---
# Strips the /api prefix from the gateway routes before forwarding: the
# IngressRoute matches PathPrefix(/api/orders) but the services serve /orders
# (Spring @RequestMapping). Without this middleware EVERY request through the
# gateway 404s — caught while wiring the k6 load suite, which is exactly
# the kind of integration gap load tests exist to expose.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: eurotransit-strip-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /api
