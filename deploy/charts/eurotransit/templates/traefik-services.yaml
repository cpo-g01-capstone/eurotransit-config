# Weighted TraefikService for the Orders canary (T6 / ADR 0026).
#
# The /api/orders IngressRoute ALWAYS routes through this resource (see
# ingress.yaml) — before T6 it pointed straight at the Service and the weights
# here were dead config. With the canary disabled, the stable track simply
# gets 100%.
#
# Canary flow (weights are values-driven — a rollout is a Git commit, not a
# manifest edit):
#   1. Set orders.canary.enabled=true, orders.canary.tag=<candidate SHA>,
#      orders.canary.weight (default 10) → Argo deploys the canary track and
#      starts splitting traffic.
#   2. Watch the canary's OWN SLIs (dedicated ServiceMonitor). D6 gate:
#      error rate < 1% AND p95 < 300ms sustained for 5 minutes.
#   3. Promote: orders.image.tag=<candidate SHA>, canary.enabled=false.
#      Abort:   canary.enabled=false (weight collapses to stable 100%).
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: eurotransit-orders-weighted
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "eurotransit.commonLabels" . | nindent 4 }}
spec:
  weighted:
    services:
      - name: eurotransit-orders
        port: 80
        {{- if .Values.orders.canary.enabled }}
        weight: {{ sub 100 (int .Values.orders.canary.weight) }}
        {{- else }}
        weight: 100
        {{- end }}
      {{- if .Values.orders.canary.enabled }}
      # The canary arm exists only while a rollout is in flight: referencing a
      # Service that isn't deployed would make Traefik fail the whole
      # weighted service.
      - name: eurotransit-orders-canary
        port: 80
        weight: {{ int .Values.orders.canary.weight }}
      {{- end }}
