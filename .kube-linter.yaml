# Policy-as-code for the EuroTransit chart (EM-38). Runs in validate.yml as a
# BLOCKING gate — kube-linter's default check set enforces the manifest-checkable
# "common mistakes" from CLAUDE.md (liveness/readiness probes present, resources
# set, no privileged/host-namespace/docker-sock, no secrets in env vars, drop
# NET_RAW, no privilege escalation, ...). Only the checks below are excluded, each
# with a reason; re-enable one once the underlying gap is closed.
checks:
  exclude:
    # Render artifact, not a real issue. The chart's default image tag is the
    # placeholder "latest"; the app-repo CI overwrites it with an immutable
    # Git-SHA before deploy (EM-32 / ADR 0004), so "latest" never reaches the
    # cluster — but a chart render here always shows it. Tag immutability is
    # enforced on the push side, not here.
    - "latest-tag"
    # run-as-non-root and no-read-only-root-fs: RE-ENABLED after hardening C1/C2
    # (2026-07-14). All deployments now set securityContext with runAsNonRoot,
    # readOnlyRootFilesystem, allowPrivilegeEscalation: false, drop: [ALL].
    # Dockerfiles set USER to a non-root UID.
    #
    # Pillar C (resilience owner): the Deployments don't yet declare pod
    # anti-affinity or topology spread. Re-enable once spread is added.
    - "no-anti-affinity"
    # Low value for our PDBs; the default unhealthy-pod eviction policy is fine.
    - "pdb-unhealthy-pod-eviction-policy"
