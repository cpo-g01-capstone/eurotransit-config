apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    # Operators install in wave 0. Their custom resources come later:
    # SealedSecrets ship in the workloads app (wave 1 at the app-of-apps level).
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: "https://bitnami.github.io/sealed-secrets"
    chart: sealed-secrets
    # Exact pin (chart 2.15.4 == controller appVersion 0.26.3). Bump deliberately.
    # Repo is bitnami.github.io/sealed-secrets — NOT bitnami-labs.github.io, which
    # 404s (see docs/agent-log.md Case 7).
    targetRevision: 2.15.4
    helm:
      parameters:
        # Pin the controller name to `sealed-secrets` so it matches the kubeseal
        # invocation in the Justfile (--controller-name sealed-secrets
        # --controller-namespace sealed-secrets). Without this the resource name
        # depends on the Helm release name and could drift.
        - name: fullnameOverride
          value: sealed-secrets
  destination:
    server: "https://kubernetes.default.svc"
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
