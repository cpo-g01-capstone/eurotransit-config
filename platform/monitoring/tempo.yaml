apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    # Wave 0 with the rest of the monitoring stack. Trace backend for the money
    # path (ADR 0022): services push OTLP spans here; Grafana queries it via the
    # datasource declared in kube-prometheus-stack.yaml.
    argocd.argoproj.io/sync-wave: "0"
spec:
  # platform project: its sourceRepos explicitly lists this chart repo
  # (bootstrap/apps/projects.yaml) — an Application's repoURL is validated
  # against its AppProject's sourceRepos, see agent-log case 14.
  project: platform
  source:
    repoURL: "https://grafana.github.io/helm-charts"
    chart: tempo
    # Pinned per ADR 0004/0020 (no HEAD/latest for operators). Single-binary
    # Tempo — right-sized for the 6 vCPU budget. Verify the pin resolves with
    # `just platform-verify`; bump deliberately.
    targetRevision: 1.10.1
    helm:
      values: |
        tempo:
          # No usage phone-home.
          reportingEnabled: false
          # 48h of traces: enough to hold a full chaos-experiment session and
          # the demo window. Raise only with persistence (see below).
          retention: 48h
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
        # PVC (T8/D13): traces are chaos-experiment evidence and must survive a
        # Pod restart — same decision as the Prometheus storageSpec. 5Gi is
        # ample for 48h retention at demo traffic (100% sampling, low rps).
        #
        # RUNBOOK — toggling persistence on an ALREADY-DEPLOYED Tempo: this
        # setting renders volumeClaimTemplates into the StatefulSet, one of the
        # fields the API server forbids patching in place. Argo will report
        # "Sync failed ... updates to statefulset spec ... are forbidden" while
        # the old (emptyDir) StatefulSet keeps running Healthy — i.e. the PVC
        # is NOT in effect. One-time fix, no Git change needed:
        #   kubectl delete statefulset tempo -n monitoring
        # Auto-sync recreates it from this manifest with the PVC attached
        # (~30-60s span-ingest gap; emptyDir traces are lost, which is the
        # very defect being fixed). Verify:
        #   kubectl get pvc -n monitoring | grep tempo   # Bound, 5Gi
        persistence:
          enabled: true
          storageClassName: managed-csi
          size: 5Gi
        # Pod-level securityContext (the chart's top-level key lands on the
        # pod spec). REQUIRED with persistence: the grafana/tempo image runs
        # as a non-root user and a freshly provisioned PVC is root-owned —
        # without fsGroup the kubelet never chowns the volume and Tempo
        # crashloops on "mkdir /var/tempo/traces: permission denied". Any
        # fsGroup value works (it is added as a supplemental group to every
        # container); 10001 matches the image's tempo user.
        securityContext:
          fsGroup: 10001
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
