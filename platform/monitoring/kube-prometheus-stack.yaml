apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    # Wave 0: installs Prometheus Operator + CRDs (ServiceMonitor, PrometheusRule).
    # The per-service ServiceMonitors/PrometheusRules ship in the app chart (wave 1).
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 86.2.3 # pinned for immutability; bump deliberately, never floating
    helm:
      # releaseName MUST stay 'kube-prometheus-stack': service ServiceMonitors are
      # labelled `release: kube-prometheus-stack` (see CLAUDE.md observability section).
      releaseName: kube-prometheus-stack
      values: |
        prometheus:
          prometheusSpec:
            # Discover ServiceMonitors / PodMonitors / PrometheusRules / Probes in
            # ALL namespaces, regardless of the chart's release label. This lets each
            # service ship its own ServiceMonitor + PrometheusRule from the app chart
            # in the `eurotransit` namespace and be scraped without extra wiring.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            retention: 7d
            # Memory rightsizing (2026-07-11): Prometheus ran with NO resources,
            # using ~660Mi unrequested — the main overcommit/eviction risk on the
            # node it lands on (the scheduler couldn't see it). Requests reflect
            # measured RSS + headroom; the limit is deliberately loose because
            # heavy dashboard queries spike RSS and an OOMKilled Prometheus loses
            # the chaos-experiment evidence the PVC exists to protect.
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 1536Mi
            # PVC (T8/D13): chaos-experiment evidence must survive Pod restarts —
            # several experiments restart pods on the node Prometheus runs on.
            # 10Gi fits the ADR 0001 sizing at 7d retention / current cardinality.
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: managed-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          defaultDashboardsEnabled: true
          # Tempo datasource: lets Grafana answer "where did this order spend
          # its time?" next to the RED/USE dashboards (ADR 0022). The uid is
          # referenced by trace links; keep it stable.
          additionalDataSources:
            - name: Tempo
              type: tempo
              uid: tempo
              access: proxy
              url: http://tempo.monitoring.svc.cluster.local:3100
          # Admin credentials from a SealedSecret (T8/D13) — replaces the chart
          # default admin/prom-operator. Sealed manifest:
          # platform/monitoring/secrets/grafana-admin.sealed.yaml; plaintext is
          # NOT in Git (ask the delivery owner, or reseal to rotate). Applies on
          # pod start: Grafana's DB is ephemeral, so a restart picks it up.
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          sidecar:
            dashboards:
              # Watch dashboard ConfigMaps in ALL namespaces, not just `monitoring`:
              # the EuroTransit RED/USE dashboards ship from the app chart in the
              # `eurotransit` namespace (the eurotransit AppProject is namespace-
              # locked, so the app chart cannot create ConfigMaps here). Same
              # rationale as the *SelectorNilUsesHelmValues flags above.
              searchNamespace: ALL
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The Prometheus Operator CRDs are too large for client-side apply
      # (last-applied-configuration annotation exceeds the size limit). Server-side
      # apply is the supported way to sync this chart via Argo CD.
      - ServerSideApply=true
