apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    # Wave 1: after the cert-manager operator + CRDs (wave 0).
    argocd.argoproj.io/sync-wave: "1"
spec:
  acme:
    # Let's Encrypt PRODUCTION — trusted certs, but strict rate limits
    # (e.g. 5 duplicate certs/week). Only point the app here after the staging
    # issuer has successfully issued for the same hostname.
    server: https://acme-v02.api.letsencrypt.org/directory
    # TODO(team): confirm the ACME contact address (reused from Lab03).
    email: vojtech.novotny@studenti.polito.it
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
