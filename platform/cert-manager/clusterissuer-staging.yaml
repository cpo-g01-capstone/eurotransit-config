apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    # Wave 1: cert-manager operator + CRDs (wave 0) must exist and be Healthy
    # before this ClusterIssuer is applied (it also goes through cert-manager's
    # admission webhook).
    argocd.argoproj.io/sync-wave: "1"
spec:
  acme:
    # Let's Encrypt STAGING — untrusted certs, but very high rate limits. Use this
    # first to prove the HTTP-01 flow end to end, then switch the app to the prod
    # issuer (ingress.certIssuer: letsencrypt-prod) once staging succeeds.
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # TODO(team): confirm the ACME contact address (reused from Lab03).
    email: vojtech.novotny@studenti.polito.it
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            # Matches ingressClass.name set on the Traefik chart. cert-manager
            # creates a temporary Ingress for the /.well-known/acme-challenge path.
            ingressClassName: traefik
