apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    # Wave 1: apply after the cert-manager operator (wave 0). But cert-manager's
    # CRDs are installed by a SEPARATE Argo Application, so a within-app sync-wave
    # can't guarantee the CRD is registered when this applies. SkipDryRunOnMissingResource
    # lets the sync retry instead of hard-failing until cert-manager.io/ClusterIssuer exists.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    # Let's Encrypt STAGING — untrusted certs, but very high rate limits. Use this
    # first to prove the HTTP-01 flow end to end, then switch the app to the prod
    # issuer (ingress.certIssuer: letsencrypt-prod) once staging succeeds.
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # ACME contact — Let's Encrypt sends expiry/account notices here. Confirmed
    # for EuroTransit (EM-34); carried over from Lab03.
    email: vojtech.novotny@studenti.polito.it
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            # Matches ingressClass.name set on the Traefik chart. cert-manager
            # creates a temporary Ingress for the /.well-known/acme-challenge path.
            ingressClassName: traefik
