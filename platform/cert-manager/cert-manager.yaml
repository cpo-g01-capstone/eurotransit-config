apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Wave 0: installs the operator + CRDs. The ClusterIssuer(s) that depend on
    # those CRDs live in this same directory at wave 1.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: 'https://charts.jetstack.io'
    # Pinned chart version (== appVersion). Bump deliberately in a PR; never float.
    targetRevision: v1.20.3
    chart: cert-manager
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
