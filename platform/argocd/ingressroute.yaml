# North-south routing for the Argo CD UI at argocd.eurotransit.vojtechn.dev.
# Two routers (same split as the app chart, EM-33): a web-entrypoint router that
# 301/308-redirects to HTTPS via the redirect-https Middleware, and a websecure
# router that serves the UI with the cert-manager cert (secret argocd-server-tls)
# and forwards to argocd-server over plain HTTP (server.insecure — Traefik
# terminates TLS at the edge, see bootstrap/install/patch-cmd-params.yaml).
#
# Wave 1 + SkipDryRunOnMissingResource: the Traefik IngressRoute CRD is installed
# by a separate wave-0 Application.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-redirect
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.eurotransit.vojtechn.dev`)
      kind: Rule
      middlewares:
        - name: argocd-redirect-https
      services:
        - name: argocd-server
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.eurotransit.vojtechn.dev`)
      kind: Rule
      services:
        # argocd-server Service port 80 (HTTP) — valid because server.insecure=true.
        - name: argocd-server
          port: 80
  tls:
    secretName: argocd-server-tls
